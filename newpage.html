<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shapes</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f0f0f0;
  }

  .container {
    position: relative;
    width: 300px;
    height: 200px;
  }

  .circle {
    width: 120px;
    height: 120px;
    background: #3498db;
    border-radius: 50%;
    position: absolute;
    top: 40px;
  }

  .circle.left {
    left: 20px;
  }

  .circle.right {
    left: 100px; /* overlap */
  }

  .rectangle {
    position: absolute;
    top: -160px;
    left: 60px;
    width: 120px;
    height: 220px;
    background: #3498db;

    border-top-left-radius: 30px;
    border-top-right-radius: 30px;

    z-index: 2; 
  }
</style>
</head>
<body>

<div class="container">
  <div class="circle left"></div>
  <div class="circle right"></div>
  <div class="rectangle"></div>
</div>

</body>
</html>
