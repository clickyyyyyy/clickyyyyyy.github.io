<!DOCTYPE html>
<html>
    <head>
        <title>Clicky's Games</title>
        <link rel="stylesheet" href="/images/style.css">
    </head>
<body>
  <section>
    <div class="main">
      <div class="left">
        <h3>Gem: <span class="gem-cost">0</span></h3>
        <img src="/images/gem.png" alt="" class="gem-image" onclick="incrementGem()" draggable="false">
      </div>
      <div class="right">
        <div class="upgrade" onclick="buyClicker()"> 
          <div class="left-section">
            Upgrade
            <img src="/images/clicker-white.png" alt=""  class="upgrade-img">
          </div>  
          <div class="mid-section">
            <h4>Clicker</h4>
            <div class="cost-info">
              <p>Cost: <span class="clicker-cost">10 Gems</span></p>
              <img src="/images/gem.png" alt="" srcset="" class="gem-img">
            </div>
            <div class="right-section">
                Level 0
            </div>
            <div class="next-level-info">
              <p>+<span class="cursor-increase">1</span> gems <br /> per second</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
    <script src="index.js"></script>

    <br>
    <a href="index.html" target="_self" style="color: orangered;">
    Home Page  
    </a>
</body>
</html>
